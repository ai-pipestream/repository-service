# Repository Service Configuration
quarkus.application.name=repository-service
quarkus.application.version=1.0.0-SNAPSHOT

# ======================================================================================================================
# HTTP / gRPC Configuration
# ======================================================================================================================
# Repository service port (38105)
quarkus.http.host=0.0.0.0
quarkus.http.port=38105
# Use separate gRPC server (Netty-based) - REQUIRED for HTTP/2 flow control window tuning
# Unified server mode (use-separate-server=false) does NOT support HTTP/2 flow control window configuration
# Separate server mode provides full control and proven 250-370 MB/s throughput
# See dynamic-grpc/UNIFIED_SERVER_LIMITATIONS.md for details
quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.enable-health-service=true
quarkus.grpc.server.enable-reflection-service=true

# gRPC Message Size Limits (2GB - 1 byte, max int value)
# This is the maximum possible gRPC message size in Java
quarkus.grpc.server.max-inbound-message-size=2147483647
quarkus.grpc.server.max-outbound-message-size=2147483647

# gRPC Flow Control - Increased to 100MB for better throughput with large messages
# Flow control window controls how much data can be in-flight before requiring acknowledgment
quarkus.grpc.server.flow-control-window=104857600

# gRPC Keepalive - Prevents connection timeouts during long operations
# Keepalive ping every 30 seconds, timeout after 5 seconds
quarkus.grpc.server.keepalive-time=30s
quarkus.grpc.server.keepalive-timeout=5s
quarkus.grpc.server.permit-keepalive-without-calls=true

# Set gRPC client message size limits for all clients (wildcard)
quarkus.grpc.clients."*".max-inbound-message-size=2147483647
quarkus.grpc.clients."*".max-outbound-message-size=2147483647

# Set gRPC client flow control for all clients (wildcard)
quarkus.grpc.clients."*".flow-control-window=104857600

# gRPC Client Keepalive - Match server settings
quarkus.grpc.clients."*".keepalive-time=30s
quarkus.grpc.clients."*".keepalive-timeout=5s
quarkus.grpc.clients."*".permit-keepalive-without-calls=true

# Dev configuration
%dev.quarkus.http.port=38105
%dev.quarkus.http.root-path=/repository

# Test configuration
%test.quarkus.http.test-port=0
# Use separate gRPC server in tests (same as production) for flow control window tuning
# Use a high port number to avoid conflicts (9002)
%test.quarkus.grpc.server.use-separate-server=true
%test.quarkus.grpc.server.test-port=9002

# ======================================================================================================================
# Database Configuration
# ======================================================================================================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=pipeline
quarkus.datasource.password=password

# Dev mode - use MySQL dev service (port 3306)
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/pipeline_repo_dev

# Hibernate configuration
%dev.quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.flyway.migrate-at-start=true

# Test: Let Hibernate create schema (avoid DROP step which can fail on clean DB with FKs)
%test.quarkus.hibernate-orm.schema-management.strategy=create
%test.quarkus.hibernate-orm.sql-load-script=no-file
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.flyway.clean-at-start=true

# Prod: Use migrations
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.baseline-on-migrate=true

quarkus.hibernate-orm.sql-load-script=no-file

# ======================================================================================================================
# Redis Configuration
# ======================================================================================================================
quarkus.redis.hosts=redis://localhost:6379
%dev.quarkus.redis.hosts=redis://localhost:6379

# ======================================================================================================================
# Dev Services Configuration
# ======================================================================================================================
# General Dev Services
%dev.quarkus.devservices.enabled=true

# Docker Compose Dev Services (Dev Profile) - Use shared dev services via extension
%dev.quarkus.compose.devservices.enabled=true
%dev.quarkus.compose.devservices.files=${user.home}/.pipeline/compose-devservices.yml
%dev.quarkus.compose.devservices.project-name=pipeline-shared-devservices
%dev.quarkus.compose.devservices.start-services=true
%dev.quarkus.compose.devservices.stop-services=false
%dev.quarkus.compose.devservices.reuse-project-for-tests=true
%dev.quarkus.devservices.timeout=120s

# Disable standalone datasource devservices since we're using Compose Dev Services
%dev.quarkus.datasource.devservices.enabled=false

# Disable Kafka Dev Services since we're using Compose Dev Services
%dev.quarkus.kafka.devservices.enabled=false

# Test profile - use compose dev services with MySQL
%test.quarkus.devservices.enabled=true
%test.quarkus.compose.devservices.files=src/test/resources/compose-test-services.yml
%test.quarkus.compose.devservices.start-services=true
%test.quarkus.compose.devservices.project-name=pipeline-test-services
%test.quarkus.compose.devservices.stop-services=false
%test.quarkus.compose.devservices.reuse-project-for-tests=true
%test.quarkus.compose.devservices.stop-timeout=30s

# Test datasource - MySQL from compose
%test.quarkus.datasource.username=pipeline
%test.quarkus.datasource.password=password
%test.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3307/pipeline_repository_test

# Disable Kafka Dev Services for test since we're using Compose Dev Services
%test.quarkus.kafka.devservices.enabled=false

# ======================================================================================================================
# Service Registration Configuration
# ======================================================================================================================
service.registration.enabled=true
%test.service.registration.enabled=false
service.registration.service-name=repository-service
service.registration.description=Central repository management for documents, modules, and configurations
service.registration.service-type=APPLICATION
service.registration.host=${REPOSITORY_SERVICE_HOST:host.docker.internal}
service.registration.port=${quarkus.http.port}
service.registration.capabilities=document-storage,version-control,metadata-management
service.registration.tags=repository,storage,core-service,traefik.enable=true,traefik.http.routers.repository-service.rule=PathPrefix(`/repository`),traefik.http.routers.repository-service.entrypoints=web,traefik.http.middlewares.repository-slash.redirectregex.regex=^/repository$$,traefik.http.middlewares.repository-slash.redirectregex.replacement=/repository/,traefik.http.routers.repository-service.middlewares=repository-slash



# Dynamic gRPC Service Discovery
quarkus.consul.host=${CONSUL_HOST:localhost}
quarkus.consul.port=${CONSUL_PORT:8500}
rokkon.service-discovery.type=consul-direct

# gRPC Service Registration
service.registration.grpc.enabled=true
service.registration.grpc.port=${quarkus.http.port}

# ======================================================================================================================
# Logging Configuration
# ======================================================================================================================
quarkus.log.level=INFO
quarkus.log.category."io.pipeline".level=INFO
quarkus.log.category."io.vertx.ext.consul".level=WARN
%dev.quarkus.log.console.level=INFO
%dev.quarkus.log.category."io.quarkus.grpc".level=WARN
%dev.quarkus.log.category."io.smallrye.stork".level=WARN

# Health checks
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# ======================================================================================================================
# Container Image Configuration
# ======================================================================================================================
quarkus.container-image.registry=git.rokkon.com
quarkus.container-image.group=io-pipeline
quarkus.container-image.name=repository-service
quarkus.container-image.tag=latest
quarkus.container-image.additional-tags=${quarkus.application.version}

# Jandex indexing for third-party and internal dynamic gRPC libraries
quarkus.index-dependency.grpc-stubs.group-id=io.pipeline
quarkus.index-dependency.grpc-stubs.artifact-id=grpc-stubs
quarkus.index-dependency.dynamic-grpc.group-id=io.pipeline
quarkus.index-dependency.dynamic-grpc.artifact-id=dynamic-grpc

# ======================================================================================================================
# S3 Configuration (MinIO)
# ======================================================================================================================
aws.s3.bucket.default=pipeline-documents

# Dev mode - use MinIO endpoint
%dev.quarkus.s3.devservices.enabled=false
%dev.quarkus.kms.devservices.enabled=false
%dev.quarkus.s3.endpoint-override=http://localhost:9000
%dev.quarkus.s3.aws.region=us-east-1
%dev.quarkus.s3.aws.credentials.type=static
%dev.quarkus.s3.aws.credentials.static-provider.access-key-id=minioadmin
%dev.quarkus.s3.aws.credentials.static-provider.secret-access-key=minioadmin
%dev.quarkus.s3.path-style-access=true
%dev.quarkus.s3.use-arn-region-enabled=false

# Prod mode - Real AWS S3 with IAM
%prod.quarkus.s3.aws.region=${AWS_REGION:us-east-1}
%prod.quarkus.s3.aws.credentials.type=default

# Test mode - uses test MinIO on port 9010 (from compose-test-services.yml)
%test.quarkus.s3.devservices.enabled=false
%test.quarkus.kms.devservices.enabled=false
%test.quarkus.s3.endpoint-override=http://localhost:9010
%test.quarkus.s3.aws.region=us-east-1
%test.quarkus.s3.aws.credentials.type=static
%test.quarkus.s3.aws.credentials.static-provider.access-key-id=minioadmin
%test.quarkus.s3.aws.credentials.static-provider.secret-access-key=minioadmin
%test.quarkus.s3.path-style-access=true
%test.quarkus.s3.use-arn-region-enabled=false

# --------------------------------------------------------------------------------------
# gRPC client configuration for tests
# When use-separate-server=true, gRPC runs on a different port than HTTP
# The NodeUploadServiceTestResource configures the client port dynamically
# --------------------------------------------------------------------------------------
# Disable in-process gRPC for tests - use real Netty channels for proper flow control testing
%test.quarkus.grpc.server.in-process.enabled=false
%test.quarkus.grpc.clients."*".in-process.enabled=false
# NodeUploadServiceTestResource will set the host and port after Quarkus starts